# 赛季星点限制 (v0.24)
season_star_cap: 3000
season_soft_reset_ratio: 0.5
base_star: 10

# 跨界采集加成 (v0.24)
cross_domain_bonus: 5

# 连接力星点奖励 (v0.24)
link_power_rewards:
  - threshold: 5
    reward: 50
  - threshold: 20
    reward: 100
  - threshold: 50
    reward: 200

content_output_max_times: 5
content_output_reward_max: 1000
content_output_reward_min: 750
coupon_rate: 1.0
custom_fund_name: 我的投资账户
daily_multipliers:
- 1.0
- 1.5
- 2.0
- 0.2
fund:
  base_rate: 1.5
  lock_days: 30
  min_withdraw: 500
fund_base_rate: 1.5
medals:
- condition: count >= 3
  event: daily_capture_count
  icon: 💡
  id: first_triple
  name: 灵光乍现
  once: true
  trigger: event
- condition: streak >= 4
  event: weekly_review_streak
  icon: 🏹
  id: weekly_hunter
  name: 周常猎人
  trigger: event
- condition: count >= 3
  event: monthly_report_cross_domain
  icon: 🕸️
  id: link_master
  name: 连线大师
  once: true
  trigger: event
- ability: link_power
  icon: 🔗
  id: link_novice
  name: 连线新手
  threshold: 5
  trigger: ability

monthly_report_reward: 500
path_bonuses:
  coupon:
  - rate: 0.95
    weeks: 2
  - rate: 0.9
    weeks: 4
  - rate: 0.85
    weeks: 8
  fund:
  - rate: 1.55
    weeks: 2
  - rate: 1.6
    weeks: 4
  - rate: 1.65
    weeks: 8
# 赛季配置 (v0.24)
seasons:
  auto_start: true
  default_length_days: 15  # 赛季默认15天

