# 默认初始值配置文件
# 用于首次启动和重置时初始化状态

# 数据根路径 (v0.24 预留)
data_root: "./data/inspire"

# 基础配置
base_star: 10
daily_multipliers:
  - 1.0
  - 1.5
  - 2.0
  - 0.2
weekly_review_reward: 200
monthly_report_reward: 500
content_output_reward_min: 750
content_output_reward_max: 1000
content_output_max_times: 5
coupon_rate: 1.0

# 基金配置
fund:
  base_rate: 1.0
  base_bonus: 0.5
  min_withdraw: 500

# 自定义名称
custom_fund_name: "我的投资账户"

# 连续加成配置
streak_bonuses:
  - days: 7
    bonus_pct: 10
  - days: 30
    bonus_pct: 30
  - days: 90
    bonus_pct: 50

# 路径选择奖惩（增量值，加减关系）
path_bonuses:
  coupon:
    - rate: -0.05
      weeks: 2
    - rate: -0.1
      weeks: 4
    - rate: -0.15
      weeks: 8
  fund:
    - rate: 0.05
      weeks: 2
    - rate: 0.1
      weeks: 4
    - rate: 0.15
      weeks: 8

# 星点里程碑系统 (v0.23)
star_milestones:
  - threshold: 500
    effect: "title_rising_star"
    name: "初露锋芒"
  - threshold: 1000
    effect: "daily_multiplier_4th_upgrade"
    name: "采集效率提升"
  - threshold: 2000
    effect: "output_reward_floor_850"
    name: "输出保障"
  - threshold: 3000
    effect: "fund_bonus_extra_5"
    name: "兑换权益提升"

# 连接力星点奖励 (v0.23)
link_power_rewards:
  - threshold: 5
    reward: 50
  - threshold: 20
    reward: 100
  - threshold: 50
    reward: 200

# 跨界采集加成 (v0.23)
cross_domain_bonus: 5

# 赛季星点限制 (v0.23)
season_star_cap: 3000
season_soft_reset_ratio: 0.5

# 勋章配置
medals:
  - id: "first_triple"
    name: "灵光乍现"
    icon: "💡"
    trigger: "event"
    event: "daily_capture_count"
    condition: "count >= 3"
    once: true
  - id: "weekly_hunter"
    name: "周常猎人"
    icon: "🏹"
    trigger: "event"
    event: "weekly_review_streak"
    condition: "streak >= 4"
  - id: "link_master"
    name: "连线大师"
    icon: "🕸️"
    trigger: "event"
    event: "monthly_report_cross_domain"
    condition: "count >= 3"
    once: true
  - id: "link_novice"
    name: "连线新手"
    icon: "🔗"
    trigger: "ability"
    ability: "link_power"
    threshold: 5
  - id: "season_pioneer"
    name: "开拓者"
    icon: "🗺️"
    trigger: "season"
    season_theme: "pioneer"

# 赛季配置
seasons:
  auto_start: true
  default_length_days: 15
  themes:
    - id: pioneer
      name: "开拓者"
      bonus: {}
    # v0.3 延展，当前不激活
    - id: connector
      name: "连线大师"
      bonus:
        cross_domain_bonus: 5
    # v0.3 延展，当前不激活
    - id: miner
      name: "深度矿工"
      bonus:
        depth_bonus: 10
    # v0.3 延展，当前不激活
    - id: sharer
      name: "分享者"
      bonus:
        publish_bonus: 100
