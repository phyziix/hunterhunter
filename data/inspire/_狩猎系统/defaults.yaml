# 默认初始值配置文件
# 用于首次启动和重置时初始化状态

# 基础配置
base_star: 10
daily_multipliers:
  - 1.0
  - 1.5
  - 2.0
  - 0.2
weekly_review_reward: 200
monthly_report_reward: 500
content_output_reward_min: 750
content_output_reward_max: 1000
content_output_max_times: 5
coupon_rate: 1.0

# 基金配置
fund:
  base_rate: 1.5
  lock_days: 30
  min_withdraw: 500

# 自定义名称
custom_fund_name: "我的投资账户"

# 连续加成配置
streak_bonuses:
  - days: 7
    bonus_pct: 10
  - days: 30
    bonus_pct: 30
  - days: 90
    bonus_pct: 50

# 路径选择奖惩
path_bonuses:
  coupon:
    - rate: 0.95
      weeks: 2
    - rate: 0.9
      weeks: 4
    - rate: 0.85
      weeks: 8
  fund:
    - rate: 1.55
      weeks: 2
    - rate: 1.6
      weeks: 4
    - rate: 1.65
      weeks: 8

# 能力值阈值配置
ability_thresholds:
  hunt_power:
    - threshold: 30
      title: "采集达人"
    - effect: daily_multiplier_4th_upgrade
      threshold: 100
  link_power:
    - threshold: 5
      title: "连线新手"
    - effect: fund_bonus_extra_5
      threshold: 20
  output_power:
    - effect: output_reward_floor_850
      threshold: 50

# 勋章配置
medals:
  - id: "first_triple"
    name: "灵光乍现"
    icon: "💡"
    trigger: "event"
    event: "daily_capture_count"
    condition: "count >= 3"
    once: true
  - id: "weekly_hunter"
    name: "周常猎人"
    icon: "🏹"
    trigger: "event"
    event: "weekly_review_streak"
    condition: "streak >= 4"
  - id: "link_master"
    name: "连线大师"
    icon: "🕸️"
    trigger: "event"
    event: "monthly_report_cross_domain"
    condition: "count >= 3"
    once: true
  - id: "hunt_apprentice"
    name: "采集达人"
    icon: "📚"
    trigger: "ability"
    ability: "hunt_power"
    threshold: 30
  - id: "link_novice"
    name: "连线新手"
    icon: "🔗"
    trigger: "ability"
    ability: "link_power"
    threshold: 5
  - id: "season_pioneer"
    name: "开拓者"
    icon: "🗺️"
    trigger: "season"
    season_theme: "pioneer"

# 赛季配置
seasons:
  auto_start: true
  default_length_days: 90
  themes:
    - id: pioneer
      name: "开拓者"
      bonus: {}
    - id: linker
      name: "连线大师"
      bonus:
        link_power_multiplier: 1.2
    - id: miner
      name: "深度矿工"
      bonus:
        hunt_power_multiplier: 1.2
    - id: sharer
      name: "分享者"
      bonus:
        output_power_multiplier: 1.2
